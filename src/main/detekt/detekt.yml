exceptions:
  active: true
  TooGenericExceptionThrown:
    active: true
    # Ta bort det undantag du vill tillåta från listan nedan:
    exceptionNames:
      - Error
      - Exception
      - Throwable

style:
  NewLineAtEndOfFile:
    active: false
  MaxLineLength:
    active: false
  VarCouldBeVal:
    active: true
    ignoreAnnotated:
      - 'com.ninjasquad.springmockk.MockkBean'
      - 'com.ninjasquad.springmockk.MockkSpyBean'
      - 'org.springframework.beans.factory.annotation.Autowired'
      - 'org.springframework.test.context.bean.override.mockito.MockitoBean'

ktlint:
  FinalNewline:
    active: false
  MaximumLineLength:
    active: false

