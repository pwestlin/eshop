exceptions:
  active: true
  TooGenericExceptionThrown:
    active: true
    # Ta bort det undantag du vill tillåta från listan nedan:
    exceptionNames:
      - Error
      - Exception
      - Throwable

style:
  NewLineAtEndOfFile:
    active: false
  MaxLineLength:
    active: false
  VarCouldBeVal:
    active: true
    ignoreAnnotated:
      - 'com.ninjasquad.springmockk.MockkBean'
      - 'com.ninjasquad.springmockk.MockkSpyBean'
      - 'org.springframework.beans.factory.annotation.Autowired'
      - 'org.springframework.test.context.bean.override.mockito.MockitoBean'

ktlint:
  FinalNewline:
    active: false
  MaximumLineLength:
    active: false

potential-bugs:
  IgnoredReturnValue:
    active: true
    ignoreFunctionCall:
      # Matchar varianten som tar en Runnable (eller Kotlin-lambda som utvärderas till Unit)
      - "org.springframework.modulith.test.Scenario.stimulate(java.lang.Runnable)"
      # Matchar varianten som tar en Supplier (när lambdat råkar returnera WebTestClient-objektet)
      - "org.springframework.modulith.test.Scenario.stimulate(java.util.function.Supplier)"